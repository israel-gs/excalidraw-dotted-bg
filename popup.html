<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        padding: 14px;
        width: 240px;
        margin: 0;
        color: #1e1e1e;
        background: #fafafa;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 12px;
        letter-spacing: 0.2px;
      }
      .field {
        margin-bottom: 12px;
      }
      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 12px;
        margin-bottom: 4px;
        color: #444;
      }
      .val {
        font-variant-numeric: tabular-nums;
        color: #1e1e1e;
        font-weight: 500;
      }
      input[type="range"] {
        width: 100%;
        margin: 0;
      }
      button {
        width: 100%;
        padding: 6px 10px;
        font-size: 12px;
        background: #fff;
        border: 1px solid #d0d0d0;
        border-radius: 4px;
        cursor: pointer;
        color: #1e1e1e;
      }
      button:hover {
        background: #f0f0f0;
      }
      .hint {
        font-size: 11px;
        color: #888;
        margin-top: 10px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Excalidraw Dotted Background</h1>

    <div class="field">
      <div class="label-row">
        <label for="spacing">Spacing</label>
        <span id="spacing-val" class="val"></span>
      </div>
      <input type="range" id="spacing" min="8" max="80" step="1" />
    </div>

    <div class="field">
      <div class="label-row">
        <label for="dot-size">Dot size</label>
        <span id="dot-size-val" class="val"></span>
      </div>
      <input type="range" id="dot-size" min="0.4" max="3" step="0.1" />
    </div>

    <button id="reset">Reset to defaults</button>

    <p class="hint">
      Changes apply live on any open Excalidraw tab.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
